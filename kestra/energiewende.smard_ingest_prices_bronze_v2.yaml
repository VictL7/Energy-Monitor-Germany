id: smard_ingest_prices_bronze_v2
namespace: energiewende

description: |
  Germany Electricity Market Price Collection (Day-Ahead Grosshandelspreis).
  Optimized version: Async concurrent HTTP + Batch upload

inputs:
  - id: start_date
    type: STRING
    defaults: "2019-01-01"
  - id: end_date
    type: STRING
    defaults: "2026-01-01"

tasks:
  - id: download_and_upload
    type: io.kestra.plugin.scripts.python.Script
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: python:3.11-slim
    pythonVersion: "3.11"
    beforeCommands:
      - pip install requests aiohttp pandas pyarrow google-cloud-storage --quiet
    env:
      START_DATE: "{{ inputs.start_date }}"
      END_DATE: "{{ inputs.end_date }}"
      GCP_CREDS: "{{ kv('GCP_CREDS') }}"
      BUCKET_NAME: "{{ kv('GCP_BUCKET_NAME') }}"
    script: |
      import os, json, asyncio, sys
      import aiohttp
      import requests
      import pandas as pd
      from google.cloud import storage
      from google.oauth2 import service_account
      from google.api_core.retry import Retry

      # ── 1. 配置 ──────────────────────────────────────
      FILTER_ID   = "4169"   # Grosshandelspreis Day-Ahead
      REGION      = "DE"
      RESOLUTION  = "quarterhour"
      CONCURRENCY = 20

      start_date  = os.environ['START_DATE']
      end_date    = os.environ['END_DATE']
      bucket_name = os.environ.get('BUCKET_NAME', '').strip()
      year = pd.to_datetime(start_date).year  # 自动提取年份
      base_url    = "https://www.smard.de/app/chart_data"

      print(f"🚀 开始采集价格数据: {start_date} → {end_date}")

      # ── 2. 获取时间戳索引 ─────────────────────────────
      index_url = f"{base_url}/{FILTER_ID}/{REGION}/index_{RESOLUTION}.json"
      try:
          resp = requests.get(index_url, timeout=30)
          resp.raise_for_status()
          all_timestamps = resp.json().get('timestamps', [])
      except Exception as e:
          print(f"❌ 索引获取失败: {e}")
          sys.exit(1)

      # ── 3. 筛选时间戳 ─────────────────────────────────
      start_ts = int(pd.to_datetime(start_date).timestamp() * 1000)
      end_ts   = int(pd.to_datetime(end_date).timestamp() * 1000)

      relevant_ts = [ts for ts in all_timestamps if ts <= end_ts]
      start_idx = 0
      for i, ts in enumerate(relevant_ts):
          if ts >= start_ts:
              start_idx = max(0, i - 1)
              break
      relevant_ts = relevant_ts[start_idx:]
      print(f"📦 需要下载的时间戳块数: {len(relevant_ts)}")

      # ── 4. 异步并发下载 ───────────────────────────────
      async def fetch_one(session, semaphore, url):
          async with semaphore:
              try:
                  async with session.get(
                      url, timeout=aiohttp.ClientTimeout(total=30)
                  ) as r:
                      if r.status == 200:
                          return await r.json()
              except Exception as e:
                  print(f"⚠️ 请求失败 {url}: {e}")
          return None

      async def fetch_all(ts_list):
          urls = [
              f"{base_url}/{FILTER_ID}/{REGION}/{FILTER_ID}_{REGION}_{RESOLUTION}_{t}.json"
              for t in ts_list
          ]
          semaphore = asyncio.Semaphore(CONCURRENCY)
          connector = aiohttp.TCPConnector(limit=CONCURRENCY)
          async with aiohttp.ClientSession(connector=connector) as session:
              tasks = [fetch_one(session, semaphore, url) for url in urls]
              return await asyncio.gather(*tasks)

      results = asyncio.run(fetch_all(relevant_ts))

      # ── 5. 解析合并 ───────────────────────────────────
      rows = []
      for payload in results:
          if payload is None:
              continue
          for item in payload.get('series', []):
              if item[1] is not None:
                  rows.append({'timestamp': item[0], 'price_eur_mwh': item[1]})

      if not rows:
          print("⚠️ 无数据，任务结束")
          sys.exit(0)
      print(f"✅ 共收到 {len(rows)} 条原始记录")

      # ── 6. 清洗过滤 ───────────────────────────────────
      df = pd.DataFrame(rows)
      df['datetime'] = pd.to_datetime(df['timestamp'], unit='ms', utc=True)
      mask = (
          (df['datetime'] >= pd.to_datetime(start_date).tz_localize('UTC')) &
          (df['datetime'] <= pd.to_datetime(end_date).tz_localize('UTC'))
      )
      df_final = (
          df.loc[mask]
            .sort_values('datetime')
            [['datetime', 'price_eur_mwh']]
            .copy()
      )
      print(f"📊 过滤后: {len(df_final)} 条  |  {df_final['datetime'].min()} → {df_final['datetime'].max()}")

      # ── 7 & 8. 按年分区并循环上传 ──────────────────────
      df_final['year'] = df_final['datetime'].dt.year
      unique_years = sorted(df_final['year'].unique()) # 排序后按顺序上传
      
      print(f"📂 准备按年分区上传，涉及年份: {unique_years}")

      try:
          creds = service_account.Credentials.from_service_account_info(
              json.loads(os.environ['GCP_CREDS'])
          )
          client = storage.Client(credentials=creds)
          bucket = client.bucket(bucket_name)

          for current_year in unique_years:
              # 1. 筛选该年份的数据
              df_year = df_final[df_final['year'] == current_year].drop(columns=['year'])
              
              # 2. 动态计算该年数据的实际范围，用于命名文件名
              # 这样即使 2019 年只有 12 月的数据，文件名也会准确反映
              actual_start = df_year['datetime'].min().strftime('%Y-%m-%d')
              actual_end   = df_year['datetime'].max().strftime('%Y-%m-%d')
              
              # 3. 生成本地临时文件
              temp_file = f"prices_{current_year}.parquet"
              df_year.to_parquet(temp_file, engine='pyarrow', index=False, compression='snappy')
              
              # 4. 构建路径：使用 current_year 保证分区正确
              # 文件名：使用该年实际的数据范围
              blob_path = f"raw/smard/price/type=day_ahead/year={current_year}/{actual_start}_to_{actual_end}.parquet"
              
              # 5. 执行上传
              blob = bucket.blob(blob_path)
              blob.upload_from_filename(temp_file, timeout=300)
              
              print(f"✅ 已上传分区 {current_year}: {blob_path} ({len(df_year)} 行)")
              
              # 6. 清理
              if os.path.exists(temp_file):
                  os.remove(temp_file)

      except Exception as e:
          print(f"❌ 分区上传失败: {e}")
          sys.exit(1)