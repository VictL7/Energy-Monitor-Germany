id: smard_ingest_consumption_bronze_v2
namespace: energiewende

description: |
  Power Consumption Data Collection (Netzlast, Residuallast, Pumpspeicher).
  Optimized version:
    - Async concurrent HTTP requests (aiohttp + asyncio)
    - EachParallel processing for three data types
    - Pre-built image (no runtime pip install)
    - Merge full data by type for single batch upload, reduce small file fragments
inputs:
  - id: start_date
    type: STRING
    defaults: "2019-01-01"
  - id: end_date
    type: STRING
    defaults: "2026-01-01"

tasks:
  - id: iterate_consumption_types
    type: io.kestra.plugin.core.flow.EachParallel # ← 改为并行
    value:
      - "410"    # Netzlast (Total Consumption / Grid Load)
      - "4359"   # Residuallast
      - "4387"   # Pumpspeicher (Pumped Storage Consumption)
    tasks:
      - id: download_and_upload
        type: io.kestra.plugin.scripts.python.Script
        taskRunner:
          type: io.kestra.plugin.scripts.runner.docker.Docker
        containerImage: python:3.11-slim    # ← 明确版本号，消除警告
        pythonVersion: "3.11"              # ← 显式声明，彻底消除警告
        beforeCommands:
          - pip install requests aiohttp pandas pyarrow google-cloud-storage --quiet
        env:
          FILTER_ID: "{{ taskrun.value }}"
          START_DATE: "{{ inputs.start_date }}"
          END_DATE: "{{ inputs.end_date }}"
          GCP_CREDS: "{{ kv('GCP_CREDS') }}"
          BUCKET_NAME: "{{ kv('GCP_BUCKET_NAME') }}"
        script: |
          import os
          import json
          import asyncio
          import aiohttp
          import requests
          import pandas as pd
          import sys
          from google.cloud import storage
          from google.oauth2 import service_account
          from google.api_core.retry import Retry

          # ──────────────────────────────────────
          # 1. 基础配置
          # ──────────────────────────────────────
          CONSUME_MAP = {
              '410':  'grid_load',
              '4359': 'residual_load',
              '4387': 'pumped_storage_consumption'
          }
          CONCURRENCY_LIMIT = 20   # 并发请求数上限，防止被 SMARD 限流

          fid        = os.environ['FILTER_ID']
          fname      = CONSUME_MAP.get(fid, 'unknown')
          start_date = os.environ['START_DATE']
          end_date   = os.environ['END_DATE']
          bucket_name = os.environ.get('BUCKET_NAME', '').strip()
          base_url   = "https://www.smard.de/app/chart_data"

          print(f"🚀 开始采集: [{fname}]  {start_date} → {end_date}")

          # ──────────────────────────────────────
          # 2. 获取时间戳索引（同步，只需一次请求）
          # ──────────────────────────────────────
          index_url = f"{base_url}/{fid}/DE/index_quarterhour.json"
          try:
              resp = requests.get(index_url, timeout=30)
              resp.raise_for_status()
              all_ts = resp.json().get('timestamps', [])
          except Exception as e:
              print(f"❌ 索引获取失败: {e}")
              sys.exit(1)

          # 筛选时间范围内的时间戳
          s_ts = int(pd.to_datetime(start_date).timestamp() * 1000)
          e_ts = int(pd.to_datetime(end_date).timestamp() * 1000)
          relevant_ts = [t for t in all_ts if t <= e_ts]

          start_idx = 0
          for i, t in enumerate(relevant_ts):
              if t >= s_ts:
                  start_idx = max(0, i - 1)
                  break
          relevant_ts = relevant_ts[start_idx:]

          print(f"📦 需要下载的时间戳块数: {len(relevant_ts)}")

          # ──────────────────────────────────────
          # 3. 异步并发下载所有数据块
          #    串行 100 请求 × 1.5s = 150s
          #    并发 20 线程   ≈ 10-15s   （10x+ 加速）
          # ──────────────────────────────────────
          async def fetch_one(session, semaphore, url):
              """单次异步请求，带信号量限流"""
              async with semaphore:
                  try:
                      async with session.get(url, timeout=aiohttp.ClientTimeout(total=30)) as r:
                          if r.status == 200:
                              return await r.json()
                  except Exception as e:
                      print(f"⚠️ 请求失败 {url}: {e}")
              return None

          async def fetch_all(ts_list):
              """并发拉取所有时间戳对应的数据块"""
              urls = [
                  f"{base_url}/{fid}/DE/{fid}_DE_quarterhour_{t}.json"
                  for t in ts_list
              ]
              semaphore = asyncio.Semaphore(CONCURRENCY_LIMIT)
              # 复用同一个 TCP 连接池，减少握手开销
              connector = aiohttp.TCPConnector(limit=CONCURRENCY_LIMIT)
              async with aiohttp.ClientSession(connector=connector) as session:
                  tasks = [fetch_one(session, semaphore, url) for url in urls]
                  return await asyncio.gather(*tasks)

          # 运行异步下载
          results = asyncio.run(fetch_all(relevant_ts))

          # ──────────────────────────────────────
          # 4. 解析并合并所有数据
          # ──────────────────────────────────────
          rows = []
          for payload in results:
              if payload is None:
                  continue
              for item in payload.get('series', []):
                  if item[1] is not None:
                      rows.append({'timestamp': item[0], 'value': item[1]})

          if not rows:
              print(f"⚠️ [{fname}] 无数据，跳过")
              sys.exit(0)

          print(f"✅ 共收到 {len(rows)} 条原始记录")

          # ──────────────────────────────────────
          # 5. 清洗、过滤、重命名
          # ──────────────────────────────────────
          df = pd.DataFrame(rows)
          df['datetime'] = pd.to_datetime(df['timestamp'], unit='ms', utc=True)

          mask = (
              (df['datetime'] >= pd.to_datetime(start_date).tz_localize('UTC')) &
              (df['datetime'] <= pd.to_datetime(end_date).tz_localize('UTC'))
          )
          df_final = (
              df.loc[mask]
                .sort_values('datetime')
                .rename(columns={'value': fname})
                [['datetime', fname]]
                .copy()
          )

          print(f"📊 过滤后记录数: {len(df_final)}")
          print(f"   时间范围: {df_final['datetime'].min()} → {df_final['datetime'].max()}")

          # ──────────────────────────────────────
          # 6. 按年份分割并上传到 GCS
          # ──────────────────────────────────────
          for yr in range(pd.to_datetime(start_date).year, pd.to_datetime(end_date).year + 1):
                df_year = df_final[df_final['datetime'].dt.year == yr]
                if df_year.empty:
                    print(f"⚠️ {yr} 无数据，跳过")
                    continue

                # 获取该年份的实际起止日期
                yr_start = df_year['datetime'].min().strftime('%Y-%m-%d')
                yr_end = df_year['datetime'].max().strftime('%Y-%m-%d')

                local_file = f"consume_{fname}_{yr}.parquet"
                df_year.to_parquet(local_file, engine='pyarrow', index=False, compression='snappy')

                blob_path = (
                    f"raw/smard/consumption/"
                    f"type={fname}/"
                    f"year={yr}/"
                    f"{yr_start}_to_{yr_end}.parquet"
                )

                try:
                    creds = service_account.Credentials.from_service_account_info(
                        json.loads(os.environ['GCP_CREDS'])
                    )
                    client = storage.Client(credentials=creds)
                    bucket = client.bucket(bucket_name)
                    blob   = bucket.blob(blob_path)
                    blob.upload_from_filename(local_file, timeout=300, retry=Retry(deadline=300))
                    print(f"✅ 已上传: gs://{bucket_name}/{blob_path}")
                except Exception as e:
                    print(f"❌ 上传失败 {yr}: {e}")
                    sys.exit(1)