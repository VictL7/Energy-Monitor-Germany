id: smard_load_gcs_to_bigquery
namespace: energiewende

description: |
  GCS Parquet → BigQuery
  Using native BQ plugin, no Docker, minimal disk usage

inputs:
  - id: year
    type: STRING
    defaults: "2019"

tasks:

  # ── Generation: Direct load for each energy type ─────────────────
  - id: delete_generation_year
    type: io.kestra.plugin.gcp.bigquery.Query
    projectId: "{{ kv('GCP_PROJECT_ID') }}"
    serviceAccount: "{{ kv('GCP_CREDS') }}"
    sql: |
      DELETE FROM `{{ kv('GCP_PROJECT_ID') }}.smard_raw.electricity_generation`
      WHERE EXTRACT(YEAR FROM DATE(timestamp_utc)) = {{ inputs.year }}

  - id: load_biomass
    type: io.kestra.plugin.gcp.bigquery.LoadFromGcs
    projectId: "{{ kv('GCP_PROJECT_ID') }}"
    serviceAccount: "{{ kv('GCP_CREDS') }}"
    destinationTable: "{{ kv('GCP_PROJECT_ID') }}.smard_raw._tmp_biomass_{{ inputs.year }}"
    format: PARQUET
    writeDisposition: WRITE_TRUNCATE
    from:
      - "gs://{{ kv('GCP_BUCKET_NAME') }}/raw/smard/generation/type=biomass/year={{ inputs.year }}/*.parquet"

  - id: insert_biomass
    type: io.kestra.plugin.gcp.bigquery.Query
    projectId: "{{ kv('GCP_PROJECT_ID') }}"
    serviceAccount: "{{ kv('GCP_CREDS') }}"
    sql: |
      INSERT INTO `{{ kv('GCP_PROJECT_ID') }}.smard_raw.electricity_generation`
      (timestamp_utc, energy_type, value_mwh, category, date)
      SELECT
        TIMESTAMP(DATETIME(datetime, 'Europe/Berlin')),
        'biomass',
        biomass,
        'renewable',
        FORMAT_DATE('%Y-%m-%d', DATE(DATETIME(datetime, 'Europe/Berlin')))
      FROM `{{ kv('GCP_PROJECT_ID') }}.smard_raw._tmp_biomass_{{ inputs.year }}`
      WHERE datetime IS NOT NULL

  - id: drop_tmp_biomass
    type: io.kestra.plugin.gcp.bigquery.Query
    projectId: "{{ kv('GCP_PROJECT_ID') }}"
    serviceAccount: "{{ kv('GCP_CREDS') }}"
    sql: "DROP TABLE IF EXISTS `{{ kv('GCP_PROJECT_ID') }}.smard_raw._tmp_biomass_{{ inputs.year }}`"

  # ── Repeat above three steps, changing energy type ───────────────────────────
