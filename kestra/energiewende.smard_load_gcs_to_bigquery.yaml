  - id: load_pumped_storage_consumption
    type: io.kestra.plugin.gcp.bigquery.LoadFromGcs
    projectId: "{{ kv('GCP_PROJECT_ID') }}"
    serviceAccount: "{{ kv('GCP_CREDS') }}"
    destinationTable: "{{ kv('GCP_PROJECT_ID') }}.smard_raw._tmp_pumped_storage_consumption_{{ inputs.year }}"
    format: PARQUET
    writeDisposition: WRITE_TRUNCATE
    from:
      - "gs://{{ kv('GCP_BUCKET_NAME') }}/raw/smard/consumption/type=pumped_storage_consumption/year={{ inputs.year }}/*.parquet"

  - id: delete_consumption_year
    type: io.kestra.plugin.gcp.bigquery.Query
    projectId: "{{ kv('GCP_PROJECT_ID') }}"
    serviceAccount: "{{ kv('GCP_CREDS') }}"
    sql: |
      DELETE FROM `{{ kv('GCP_PROJECT_ID') }}.smard_raw.grid_consumption`
      WHERE EXTRACT(YEAR FROM DATE(timestamp_utc)) = {{ inputs.year }}

  - id: insert_consumption
    type: io.kestra.plugin.gcp.bigquery.Query
    projectId: "{{ kv('GCP_PROJECT_ID') }}"
    serviceAccount: "{{ kv('GCP_CREDS') }}"
    sql: |
      INSERT INTO `{{ kv('GCP_PROJECT_ID') }}.smard_raw.grid_consumption`
      (timestamp_utc, grid_load, residual_load, pumped_storage_consumption, date)
      SELECT
        TIMESTAMP(DATETIME(gl.datetime, 'Europe/Berlin')),
        gl.grid_load,
        rl.residual_load,
        ps.pumped_storage_consumption,
        FORMAT_DATE('%Y-%m-%d', DATE(DATETIME(gl.datetime, 'Europe/Berlin')))
      FROM `{{ kv('GCP_PROJECT_ID') }}.smard_raw._tmp_grid_load_{{ inputs.year }}` gl
      LEFT JOIN `{{ kv('GCP_PROJECT_ID') }}.smard_raw._tmp_residual_load_{{ inputs.year }}` rl
        ON gl.datetime = rl.datetime
      LEFT JOIN `{{ kv('GCP_PROJECT_ID') }}.smard_raw._tmp_pumped_storage_consumption_{{ inputs.year }}` ps
        ON gl.datetime = ps.datetime
      WHERE gl.datetime IS NOT NULL

  - id: drop_tmp_consumption
    type: io.kestra.plugin.gcp.bigquery.Query
    projectId: "{{ kv('GCP_PROJECT_ID') }}"
    serviceAccount: "{{ kv('GCP_CREDS') }}"
    sql: |
      DROP TABLE IF EXISTS `{{ kv('GCP_PROJECT_ID') }}.smard_raw._tmp_grid_load_{{ inputs.year }}`;
      DROP TABLE IF EXISTS `{{ kv('GCP_PROJECT_ID') }}.smard_raw._tmp_residual_load_{{ inputs.year }}`;
      DROP TABLE IF EXISTS `{{ kv('GCP_PROJECT_ID') }}.smard_raw._tmp_pumped_storage_consumption_{{ inputs.year }}`;

