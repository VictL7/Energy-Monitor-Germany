      WHERE EXTRACT(YEAR FROM DATE(timestamp_utc)) = {{ inputs.year }}

  - id: load_prices_tmp
    type: io.kestra.plugin.gcp.bigquery.LoadFromGcs
    projectId: "{{ kv('GCP_PROJECT_ID') }}"
    serviceAccount: "{{ kv('GCP_CREDS') }}"
    destinationTable: "{{ kv('GCP_PROJECT_ID') }}.smard_raw._tmp_price_{{ inputs.year }}"
    format: PARQUET
    writeDisposition: WRITE_TRUNCATE
    from:
      - "gs://{{ kv('GCP_BUCKET_NAME') }}/raw/smard/price/type=day_ahead/year={{ inputs.year }}/*.parquet"

  - id: insert_prices
    type: io.kestra.plugin.gcp.bigquery.Query
    projectId: "{{ kv('GCP_PROJECT_ID') }}"
    serviceAccount: "{{ kv('GCP_CREDS') }}"
    sql: |
      INSERT INTO `{{ kv('GCP_PROJECT_ID') }}.smard_raw.electricity_prices`
      (timestamp_utc, price_eur_mwh, price_type, date)
      SELECT
        TIMESTAMP(DATETIME(datetime, 'Europe/Berlin')),
        price_eur_mwh,
        'day_ahead',
        FORMAT_DATE('%Y-%m-%d', DATE(DATETIME(datetime, 'Europe/Berlin')))
      FROM `{{ kv('GCP_PROJECT_ID') }}.smard_raw._tmp_price_{{ inputs.year }}`
      WHERE datetime IS NOT NULL

  - id: drop_tmp_prices
    type: io.kestra.plugin.gcp.bigquery.Query
    projectId: "{{ kv('GCP_PROJECT_ID') }}"
    serviceAccount: "{{ kv('GCP_CREDS') }}"
    sql: "DROP TABLE IF EXISTS `{{ kv('GCP_PROJECT_ID') }}.smard_raw._tmp_price_{{ inputs.year }}`"